name: CI / Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Lint & Type-check Backend ─────────────────────────────────
  backend-check:
    name: Backend TypeScript check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm run build
        env:
          # Dummy env vars so TypeScript compilation doesn't fail
          SECRET_KEY: ci-dummy-secret-key-minimum-64-chars-long-padding-here
          DATABASE_URL: postgres://user:pass@localhost:5432/db
          STRIPE_API_KEY: sk_test_dummy
          STRIPE_WEBHOOK_SIGNING_SECRET: whsec_dummy
          LLM_PROVIDER_API_KEY: sk-ant-dummy
          FRONTEND_URL: http://localhost
          CORS_ORIGIN: http://localhost

  # ── Lint & Type-check MCP Server ─────────────────────────────
  mcp-check:
    name: MCP Server TypeScript check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcp-server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mcp-server/package-lock.json
      - run: npm ci
      - run: npm run build

  # ── Validate Frontend HTML ────────────────────────────────────
  frontend-check:
    name: Frontend HTML check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check frontend/index.html exists and is not empty
        run: |
          if [ ! -f frontend/index.html ]; then echo "ERROR: frontend/index.html missing" && exit 1; fi
          SIZE=$(wc -c < frontend/index.html)
          if [ "$SIZE" -lt 1000 ]; then echo "ERROR: frontend/index.html too small ($SIZE bytes)" && exit 1; fi
          echo "✅ frontend/index.html looks good ($SIZE bytes)"
      - name: Check root index.html is not broken
        run: |
          SIZE=$(wc -c < index.html)
          echo "root index.html size: $SIZE bytes"
          if grep -q "404: Not Found" index.html; then echo "ERROR: root index.html contains '404: Not Found'" && exit 1; fi
          echo "✅ root index.html OK"

  # ── Deploy to Vercel (frontend) ───────────────────────────────
  deploy-vercel:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    needs: [backend-check, mcp-check, frontend-check]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Vercel
        run: |
          npm install -g vercel@latest
          vercel --prod --token=${{ secrets.VERCEL_TOKEN }} --yes
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  # ── Deploy to Render (backend) ────────────────────────────────
  deploy-render:
    name: Trigger Render deploy
    runs-on: ubuntu-latest
    needs: [backend-check, mcp-check, frontend-check]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Trigger Render backend deploy
        run: |
          curl -s -X POST "${{ secrets.RENDER_DEPLOY_HOOK_BACKEND }}" | jq .
      - name: Trigger Render MCP deploy
        run: |
          curl -s -X POST "${{ secrets.RENDER_DEPLOY_HOOK_MCP }}" | jq .
