services:
  - type: web
    name: cri-backend
    runtime: node
    buildCommand: cd backend && npm install
    startCommand: cd backend && node src/index.js
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 8080
      - key: DATABASE_URL
        fromDatabase:
          name: cri-postgres
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: INTERNAL_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        value: https://cri-assessment-tool.vercel.app
      - key: FRONTEND_URL
        value: https://cri-assessment-tool.vercel.app
    healthCheckPath: /health

  - type: web
    name: cri-mcp-server
    runtime: node
    buildCommand: cd mcp-server && npm install
    startCommand: cd mcp-server && node dist/index.js
    plan: free
    envVars:
      - key: MCP_PORT
        value: 3001
    healthCheckPath: /health

  - type: cron
    name: cri-reminders
    runtime: node
    buildCommand: cd backend && npm install
    startCommand: cd backend && node scripts/process-reminders.js
    schedule: "0 * * * *"

databases:
  - name: cri-postgres
    plan: free
    databaseName: cri_db
    user: cri_user
